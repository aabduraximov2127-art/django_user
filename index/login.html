<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberUsers - Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  background:#040816;
}

/* ========================= */
/* BACKGROUND (CHEKSIZ VA SILLIQ) */
/* ========================= */
.background{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.stars{
  position:absolute;
  width:200%;
  height:200%;
  /* 55px o'lchamga mos silliq cheksiz aylanish koordinatasi */
  background: radial-gradient(white 1px, transparent 1px);
  background-size:55px 55px;
  animation:starsMove 25s linear infinite;
  opacity:.8;
  will-change: transform;
}

@keyframes starsMove{
  from{ transform: translate(0,0); }
  /* background-size karralisi (55 * 10 = 550) uzluksiz chok hosil qiladi */
  to{ transform: translate(-550px,-550px); }
}

.glow1{
  position:absolute;
  width:500px;
  height:500px;
  background:#2155ff;
  border-radius:50%;
  filter:blur(160px);
  top:-120px;
  left:-120px;
  opacity:.4;
}

.glow2{
  position:absolute;
  width:450px;
  height:450px;
  background:#ff0055;
  border-radius:50%;
  filter:blur(170px);
  bottom:-150px;
  right:-100px;
  opacity:.35;
}

/* ========================= */
/* SPIDERMAN */
/* ========================= */
.spiderman{
  position:absolute;
  right:30px;
  bottom:0;
  width:470px;
  object-fit:contain;
  filter: drop-shadow(0 0 40px rgba(255,0,0,.45));
  animation:floatSpider 4s ease-in-out infinite;
  user-select:none;
  pointer-events:none;
}

@keyframes floatSpider{
  0%, 100%{ transform:translateY(0px); }
  50%{ transform:translateY(-18px); }
}

/* ========================= */
/* MAIN PANEL */
/* ========================= */
.wrapper{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  width: 100%;
}

.logo{
  font-size:60px;
  font-weight:800;
  color:white;
  letter-spacing:3px;
  text-shadow:
    0 0 10px rgba(255,255,255,.8),
    0 0 30px rgba(70,130,255,.7),
    0 0 50px rgba(70,130,255,.5);
}

.logo span{ color:#4da3ff; }

/* LOGIN BOX */
.login-box{
  width:530px;
  padding:30px;
  border-radius:34px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  box-shadow:
    0 0 50px rgba(255,255,255,.06),
    inset 0 0 20px rgba(255,255,255,.03);
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
  color:#eee;
  font-size:14px;
}

/* LANGUAGE */
.lang{
  position:relative;
  background:white;
  color:#111;
  padding:10px 16px;
  border-radius:16px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  user-select:none;
  transition:.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.lang:hover{ transform:scale(1.05); }

.lang-menu{
  position:absolute;
  top:52px;
  right:0;
  width:190px;
  background:white;
  border-radius:16px;
  overflow:hidden;
  display:none;
  box-shadow:0 15px 35px rgba(0,0,0,.35);
  z-index: 10;
}

.lang-menu div{
  padding:13px 16px;
  color:#111;
  transition:.2s;
  cursor:pointer;
  text-align: left;
}

.lang-menu div:hover{ background:#f3f3f3; }

/* TITLE */
.title{
  text-align:center;
  margin-bottom:22px;
}

.title h2{
  font-size:38px;
  color:white;
  margin-bottom:7px;
  font-weight:700;
}

.title p{
  color:#d8d8d8;
  font-size:17px;
}

/* TABS */
.tabs{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:5px;
  display:flex;
  margin-bottom:20px;
}

.tab{
  flex:1;
  border:none;
  height:56px;
  border-radius:16px;
  background:transparent;
  color:#ddd;
  font-size:20px;
  cursor:pointer;
  font-weight:600;
  transition:.3s ease;
}

.tab.active{
  background:white;
  color:#111b44;
}

/* INPUT */
.input-box{ margin-bottom:17px; }

.input-box input{
  width:100%;
  height:60px;
  border:none;
  outline:none;
  border-radius:18px;
  padding:0 20px;
  background:rgba(255,255,255,.88);
  font-size:18px;
  color:#222;
  transition:.3s ease;
}

.input-box input:focus{
  transform:scale(1.015);
  box-shadow:0 0 20px rgba(90,160,255,.35);
  background:#ffffff;
}

.input-box input::placeholder{ color:#777; }

/* BUTTON */
.login-btn{
  width:100%;
  height:62px;
  border:none;
  border-radius:20px;
  background: linear-gradient(45deg, #0066ff, #00b7ff, #4f7dff);
  background-size: 200% auto;
  color:white;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
  transition:.4s ease;
  box-shadow: 0 10px 30px rgba(0,120,255,.35);
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-btn:hover{ 
  background-position: right center;
  transform:translateY(-3px); 
}

/* FOOTER */
.bottom-text{
  margin-top:24px;
  text-align:center;
  color:#ddd;
  font-size:17px;
}

.bottom-text a{
  color:#4da3ff;
  text-decoration:none;
  font-weight:700;
  margin-left:6px;
  transition: .2s;
}

.bottom-text a:hover{
  text-decoration: underline;
  color: #00b7ff;
}

/* RESPONSIVE */
@media(max-width:950px){
  .spiderman{
    width:300px;
    right:-30px;
    opacity:.8;
  }
}

@media(max-width:600px){
  .login-box{
    width:92%;
    padding:24px;
  }
  .logo{ font-size:42px; }
  .title h2{ font-size:29px; }
  .tab{ font-size:17px; }
  .spiderman{
    width:190px;
    opacity:.25;
  }
}
</style>
</head>
<body>

<div class="background">
  <div class="stars"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <img class="spiderman" src="https://pngimg.com/d/spider_man_PNG90.png" alt="Spiderman">
</div>

<div class="wrapper">
  <div class="logo">
    Cyber<span>Users</span>
  </div>

  <div class="login-box">
    <div class="top-row">
      <div>🚀 Premium Login</div>

      <!-- LANGUAGE SELECTOR -->
      <div class="lang" onclick="toggleLangMenu(event)">
        🌐 <span id="currentLang">O'zb</span>
        <div class="lang-menu" id="langMenu">
          <div onclick="changeLang('uz', event)">🇺🇿 Oʻzbekcha</div>
          <div onclick="changeLang('ru', event)">🇷🇺 Русский</div>
          <div onclick="changeLang('en', event)">🇺🇸 English</div>
        </div>
      </div>
    </div>

    <div class="title">
      <h2 id="titleText">Saytimizga xush kelibsiz</h2>
      <p id="subText">Bugun nimani boshlaymiz?</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button type="button" class="tab active" id="studentBtn" onclick="switchTab('student')">Student</button>
      <button type="button" class="tab" id="parentBtn" onclick="switchTab('parent')">Ota-ona</button>
    </div>

    <!-- LOGIN FORM -->
    <form action="{% url 'user_list' %}" method="POST">
      {% csrf_token %}
      
      <!-- Back-end tahlili uchun yashirin maydonlar (Muhim!) -->
      <input type="hidden" name="user_type" id="userTypeInput" value="student">
      <input type="hidden" name="selected_language" id="langInput" value="uz">

      <div class="input-box">
        <input type="text" name="username" id="usernameInput" placeholder="Login yoki ID" required>
      </div>

      <div class="input-box">
        <input type="password" name="password" id="passwordInput" placeholder="Parol" required>
      </div>

      <button type="submit" class="login-btn">
        <span id="loginText">Kirish</span>
      </button>
    </form>

    <div class="bottom-text">
      <span id="accountText">Akkaunt yo‘qmi?</span>
      <a href="{% url 'register_view' %}" id="registerText">Ro‘yxatdan o‘tish</a>
    </div>
  </div>
</div>

<script>
/* Tanlangan joriy til xotirasi (Global holat) */
let currentSelectedLanguage = 'uz';

/* MENU TOGGLE */
function toggleLangMenu(event){
  event.stopPropagation();
  const menu = document.getElementById("langMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* TABS LOGIC */
function switchTab(type) {
  const studentBtn = document.getElementById("studentBtn");
  const parentBtn = document.getElementById("parentBtn");
  const userTypeInput = document.getElementById("userTypeInput");

  if(type === 'student') {
    studentBtn.classList.add("active");
    parentBtn.classList.remove("active");
    userTypeInput.value = "student";
  } else {
    parentBtn.classList.add("active");
    studentBtn.classList.remove("active");
    userTypeInput.value = "parent";
  }
}

/* TRANSLATIONS */
const translations = {
  uz: {
    lang:"O'zb",
    title:"Saytimizga xush kelibsiz",
    sub:"Bugun nimani boshlaymiz?",
    student:"Student",
    parent:"Ota-ona",
    username: "Login yoki ID",
    password:"Parol",
    login:"Kirish",
    account:"Akkaunt yo‘qmi?",
    register:"Ro‘yxatdan o‘tish"
  },
  ru: {
    lang:"Рус",
    title:"Добро пожаловать",
    sub:"Что начнем сегодня?",
    student:"Студент",
    parent:"Родитель",
    username: "Логин или ID",
    password:"Пароль",
    login:"Войти",
    account:"Нет аккаунта?",
    register:"Регистрация"
  },
  en: {
    lang:"Eng",
    title:"Welcome",
    sub:"What are we starting today?",
    student:"Student",
    parent:"Parent",
    username: "Login or ID",
    password:"Password",
    login:"Login",
    account:"No account?",
    register:"Register"
  }
};

/* CHANGE LANGUAGE */
function changeLang(language, event){
  if(event) event.stopPropagation(); // Hodisa formasini to'xtatamiz
  
  currentSelectedLanguage = language;
  const t = translations[language];

  // Yashirin input qiymatini yangilaymiz (Django uchun)
  document.getElementById("langInput").value = language;

  // Matnlarni almashtirish
  document.getElementById("currentLang").innerText = t.lang;
  document.getElementById("titleText").innerText = t.title;
  document.getElementById("subText").innerText = t.sub;
  document.getElementById("studentBtn").innerText = t.student;
  document.getElementById("parentBtn").innerText = t.parent;
  document.getElementById("usernameInput").placeholder = t.username;
  document.getElementById("passwordInput").placeholder = t.password;
  document.getElementById("loginText").innerText = t.login;
  document.getElementById("accountText").innerText = t.account;
  document.getElementById("registerText").innerText = t.register;
  
  document.getElementById("langMenu").style.display = "none";
}

/* CLOSE MENU ON OUTSIDE CLICK */
window.addEventListener("click", function(e){
  if(!e.target.closest(".lang")){
    document.getElementById("langMenu").style.display = "none";
  }
});
</script>

</body>
</html>
