<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0f1c;
    overflow: hidden;
    color: white;
}

/* glowing blobs */
.blob{
    position: absolute;
    width: 300px;
    height: 300px;
    filter: blur(80px);
    opacity: 0.5;
    animation: move 10s infinite alternate;
}

.blob1{
    background: #3b82f6;
    top: -50px;
    left: -50px;
}

.blob2{
    background: #ec4899;
    bottom: -80px;
    right: -80px;
    animation-delay: 3s;
}

@keyframes move{
    from{transform: translate(0,0);}
    to{transform: translate(80px, -60px);}
}

/* CARD */
.box{
    width: 440px;
    padding: 45px;
    border-radius: 25px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);

    text-align: center;

    box-shadow: 0 20px 50px rgba(0,0,0,0.6);

    animation: fade 0.8s ease forwards;
    transform: translateY(30px);
    opacity: 0;
}

@keyframes fade{
    to{
        transform: translateY(0);
        opacity: 1;
    }
}

/* title */
h1{
    font-size: 36px;
    background: linear-gradient(90deg,#3b82f6,#ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* text */
p{
    margin-top: 10px;
    opacity: 0.7;
    font-size: 15px;
}

/* greeting */
.greet{
    margin-top: 15px;
    font-size: 16px;
    color: #a5f3fc;
}

/* buttons */
.btns{
    margin-top: 25px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

a{
    text-decoration: none;
    padding: 11px 18px;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* neon glow effect */
a::before{
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    transition: 0.4s;
}

a:hover::before{
    left: 100%;
}

a:hover{
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* button colors */
.login{ background: #3b82f6; }
.register{ background: #ec4899; }
.logout{ background: #ef4444; }

/* small glow border animation */
.box::before{
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 25px;
    background: linear-gradient(90deg,#3b82f6,#ec4899,#3b82f6);
    z-index: -1;
    filter: blur(20px);
    opacity: 0.3;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="box">

    <h1>Welcome</h1>

    <p>This is your Django application home page</p>

    {% if user.is_authenticated %}

        <div class="greet">
            Hello, <b>{{ user.first_name }}</b> 👋
        </div>

        <div class="btns">
            <a href="{% url 'logout' %}" class="logout">Logout</a>
        </div>

    {% else %}

        <p>You are not logged in</p>

        <div class="btns">
            <a href="{% url 'login' %}" class="login">Login</a>
            <a href="{% url 'register_view' %}" class="register">Register</a>
        </div>

    {% endif %}

</div>

</body>
</html>
