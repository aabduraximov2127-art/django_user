<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        font-family: Arial, sans-serif;
        background: #111;
        padding: 20px;
        min-height: 100vh;
    }

    .nav{
        margin-bottom: 20px;
        text-align: center;
    }

    .nav a{
        background: #007BFF;
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        text-decoration: none;
        transition: 0.3s;
        display: inline-block;
    }

    .nav a:hover{
        background: hotpink;
    }

    .nav form{
        margin-top: 10px;
    }

    .nav input{
        padding: 8px;
        border-radius: 8px;
        border: none;
        width: 200px;
        outline: none;
    }

    .nav button{
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: #007BFF;
        color: white;
        cursor: pointer;
    }

    .container{
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 15px;
    }

    .card{
        width: 150px;
        height: 190px;
        background: white;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: 0.4s ease;
    }

    .card:hover{
        transform: translateY(-8px) scale(1.03);
    }

    .avatar{
        width: 55px;
        height: 55px;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid #007BFF;
        margin-bottom: 8px;
    }

    .avatar img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .name{
        font-size: 14px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
    }

    .actions{
        display: flex;
        gap: 5px;
    }

    .actions a{
        font-size: 10px;
        padding: 4px 6px;
        border-radius: 6px;
        text-decoration: none;
        color: white;
    }

    .update{ background: #007BFF; }
    .delete{ background: #ff2e2e; }
</style>
</head>

<body>

<div class="nav">

    <a href="{% url 'user_create' %}">+ Create User</a>

    <!-- SEARCH FORM -->
    <form method="GET">
        <input type="text"
               name="q"
               placeholder="Ism yozing..."
               value="{{ query }}">
        <button type="submit">Search</button>
    </form>

</div>

<div class="container">

{% for user in users %}

<div class="card user-card"
     data-url="{% url 'user_detail' slug=user.slug %}">

    <div class="avatar">
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}">
        {% else %}
            <img src="https://i.ibb.co/2t3Fq8F/default-user.png">
        {% endif %}
    </div>

    <div class="name">
        {{ user.first_name }}
    </div>

    <div class="actions">

        <a class="update"
           href="{% url 'user_update' slug=user.slug %}"
           onclick="event.stopPropagation()">
            Update
        </a>

        <a class="delete"
           href="{% url 'user_delete' id=user.id %}"
           onclick="event.stopPropagation()">
            Delete
        </a>

    </div>

</div>

{% endfor %}

</div>

<script>
    const cards = document.querySelectorAll(".user-card");

    cards.forEach(card => {
        card.addEventListener("click", function(){
            window.location.href = this.dataset.url;
        });
    });
</script>

</body>
</html>
