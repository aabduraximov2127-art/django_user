<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Users</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#050816;
    padding:25px;
    color:white;
}

/* ================= BACKGROUND ================= */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #06b6d4 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #a855f7 0%, transparent 40%),
    radial-gradient(circle at 50% 80%, #ff006e 0%, transparent 40%);
    filter:blur(90px);
    opacity:.4;
    z-index:-2;
}

/* ================= HEADER ================= */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

/* ❌ ANIMATION OLIB TASHLANDI */
.logo{
    font-size:36px;
    font-weight:800;
    white-space:nowrap;
    background:linear-gradient(90deg,#00f5ff,#a855f7,#ff006e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= GRID ================= */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
}

/* ================= CARD ================= */
.card{
    position:relative;
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition:.3s;
    overflow:hidden;
}

/* COLORS */
.card:nth-child(1){--clr:#00f5ff;}
.card:nth-child(2){--clr:#a855f7;}
.card:nth-child(3){--clr:#ff006e;}
.card:nth-child(4){--clr:#22c55e;}
.card:nth-child(5){--clr:#f59e0b;}
.card:nth-child(6){--clr:#3b82f6;}
.card:nth-child(7){--clr:#ef4444;}
.card:nth-child(8){--clr:#10b981;}

/* glow */
.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:var(--clr);
    opacity:0;
    filter:blur(20px);
    transition:.4s;
    z-index:-1;
}

.card:hover::before{
    opacity:0.6;
}

.card:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:0 0 20px var(--clr);
    border-color:var(--clr);
}

/* ================= AVATAR ================= */
.avatar{
    width:65px;
    height:65px;
    margin:auto;
    border-radius:16px;
    overflow:hidden;
    border:2px solid var(--clr);
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ================= INFO ================= */
.info{
    text-align:center;
    margin-top:10px;
}

.info h2{
    font-size:13px;
    font-weight:700;
}

.info p{
    font-size:11px;
    color:#aaa;
}

/* ================= ACTIONS ================= */
.actions{
    display:flex;
    gap:6px;
    margin-top:10px;
}

.actions a{
    flex:1;
    padding:6px;
    font-size:11px;
    text-align:center;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

.edit{background:#3b82f6;}
.delete{background:#ef4444;}

/* ================= EMPTY ================= */
.empty{
    text-align:center;
    margin-top:60px;
    opacity:.6;
}

/* ================= RESPONSIVE ================= */
@media(max-width:600px){
    .header{flex-direction:column;gap:10px;}
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">CyberUsers</div>
</div>

<div class="container">

{% for user in users %}

<div class="card user-card" data-url="{% url 'user_detail' slug=user.slug %}">

    <div class="avatar">
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}">
        {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        {% endif %}
    </div>

    <div class="info">
        <h2>{{ user.first_name }} {{ user.last_name }}</h2>
        <p>{{ user.phon }}</p>
    </div>

    <div class="actions">
        <a class="edit" href="{% url 'user_update' slug=user.slug %}">Edit</a>
        <a class="delete" href="{% url 'user_delete' id=user.id %}">Delete</a>
    </div>

</div>

{% empty %}
<div class="empty">No users found</div>
{% endfor %}

</div>

<script>

/* open user */
document.querySelectorAll(".user-card").forEach(card=>{
    card.addEventListener("click",()=>{
        window.location.href = card.dataset.url;
    });
});

</script>

</body>
</html>
