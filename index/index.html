<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height: 100vh;
    background: radial-gradient(circle at top, #1f2937, #0f172a);
    padding: 30px;
    color: white;
}

/* NAV */
.nav{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    animation: fadeDown 0.6s ease;
}

@keyframes fadeDown{
    from{transform: translateY(-20px); opacity: 0;}
    to{transform: translateY(0); opacity: 1;}
}

.nav a{
    background: linear-gradient(45deg, #06b6d4, #3b82f6);
    color: white;
    padding: 10px 18px;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.nav a:hover{
    transform: scale(1.05);
    box-shadow: 0 0 15px #06b6d4;
}

.nav form{
    display: flex;
    gap: 10px;
}

.nav input{
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 250px;
    transition: 0.3s;
}

.nav input:focus{
    box-shadow: 0 0 10px #06b6d4;
}

.nav button{
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #06b6d4;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.nav button:hover{
    background: #0ea5e9;
}

/* GRID */
.container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
    animation: pop 0.5s ease;
}

@keyframes pop{
    from{transform: scale(0.8); opacity: 0;}
    to{transform: scale(1); opacity: 1;}
}

.card:hover{
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 20px rgba(6,182,212,0.6);
}

/* ripple effect */
.card::after{
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    top: 50%;
    left: 50%;
    transition: width 0.4s, height 0.4s;
}

.card:active::after{
    width: 200px;
    height: 200px;
}

/* AVATAR */
.avatar{
    width: 70px;
    height: 70px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #06b6d4;
}

.avatar img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* NAME */
.name{
    margin-top: 10px;
    font-weight: bold;
    font-size: 15px;
}

/* ACTIONS */
.actions{
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
}

.actions a{
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.update{
    background: #3b82f6;
}

.delete{
    background: #ef4444;
}

.actions a:hover{
    transform: scale(1.1);
}

/* EMPTY */
.empty{
    text-align: center;
    margin-top: 40px;
    font-size: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="nav">

    <a href="{% url 'user_create' %}">
        + Create User
    </a>

    <form method="GET">
        <input type="text" name="q" placeholder="Ism yozing..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>

</div>

<div class="container">

{% for user in users %}

<div class="card user-card"
     data-url="{% url 'user_detail' slug=user.slug %}">

    <div class="avatar">
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}">
        {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        {% endif %}
    </div>

    <div class="name">
        {{ user.first_name }} {{ user.last_name }}
    </div>

    <div class="actions">
        <a href="{% url 'user_update' slug=user.slug %}" class="update"
           onclick="event.stopPropagation()">
            Update
        </a>

        <a href="{% url 'user_delete' id=user.id %}" class="delete"
           onclick="event.stopPropagation()">
            Delete
        </a>
    </div>

</div>

{% empty %}
    <h1 class="empty">User topilmadi</h1>
{% endfor %}

</div>

<script>
document.querySelectorAll(".user-card").forEach(card => {
    card.addEventListener("click", () => {
        window.location.href = card.dataset.url;
    });
});
</script>

</body>
</html>
