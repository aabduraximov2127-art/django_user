<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
</head>
<body>
<div class="div1"><a href="{% url 'user_create' %}">Create User</a></div>

    {% for user in users %}

    <div class="div3"><a href="{% url 'user_detail' slug=user.slug %}"><i>{{ user.first_name }} {{ user.last_name }}</i></a></div>
        
        
        <p>{{ user.age }}</p>
<div class="div2"><a href="{% url 'user_update' slug=user.slug %}"><mark><b><i>Update</i></b></mark></a><br>
        <a href="{% url 'user_delete' id=user.id %}"><mark><b><i>Delete</i></b></mark></a></div>
        <hr>
        
    {% endfor %}

<style>
    body{
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    .div1{
        text-align: center;
        margin-bottom: 20px;
        
    }
    .div1 a{
        text-decoration: none;
        color: #007BFF;
        font-size: 18px;
        

    }
    .div1 a:hover {
        text-decoration: underline;
    }
    .div2{
        text-align: center;
        margin-top: 10px;
    }
    .div2 a{
        text-decoration: none;
        color: #007BFF;
        font-size: 16px;
    }
     .div2 a:hover {
        text-decoration: underline;
    }
    .div3{
        background-color: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 5px 4px rgba(0, 0, 0, 0.1);
        margin-bottom: 10px;
        
    }
    .div3 a{
        text-decoration: none;
        color: #333;
        font-size: 20px;
    }
     .div3 a:hover {
        text-decoration: underline;
        color:hotpink  ;
        
    }
    
</style>
</body>
</html>
