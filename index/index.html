<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Users</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#050816;
    overflow-x:hidden;
    color:white;
    padding:25px;
}

/* ================= BACKGROUND ================= */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #06b6d4 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, #8b5cf6 0%, transparent 35%),
    radial-gradient(circle at 40% 80%, #f43f5e 0%, transparent 35%);
    filter:blur(80px);
    opacity:.45;
    z-index:-2;
    animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
    from{transform:scale(1);}
    to{transform:scale(1.2) rotate(8deg);}
}

/* ================= HEADER ================= */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

/* LOGO */
.logo{
    width:240px;
    overflow:hidden;
    white-space:nowrap;
}

#cyberText{
    display:inline-block;
    font-size:36px;
    font-weight:800;
    background:linear-gradient(45deg,#06b6d4,#8b5cf6,#f43f5e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= NAV ================= */
.nav{
    display:flex;
    gap:10px;
}

.btn{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:600;
    color:white;
    text-decoration:none;
    transition:.3s;
    font-size:13px;
}

.create-btn{
    background:linear-gradient(135deg,#06b6d4,#3b82f6);
}

.logout-btn{
    background:linear-gradient(135deg,#ef4444,#f97316);
}

.btn:hover{
    transform:scale(1.05);
}

/* ================= GRID (COMPACT) ================= */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px;
}

/* ================= CARD (SMALL) ================= */
.card{
    position:relative;
    padding:12px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
    cursor:pointer;
    transition:.3s;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
}

/* ================= AVATAR ================= */
.avatar{
    width:65px;
    height:65px;
    margin:auto;
    border-radius:16px;
    overflow:hidden;
    border:2px solid #06b6d4;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ================= INFO ================= */
.info{
    text-align:center;
    margin-top:10px;
}

.info h2{
    font-size:13px;
    font-weight:700;
}

.info p{
    font-size:11px;
    color:#aaa;
}

/* ================= ACTIONS ================= */
.actions{
    display:flex;
    gap:6px;
    margin-top:10px;
}

.actions a{
    flex:1;
    padding:6px;
    font-size:11px;
    text-align:center;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

.actions a:nth-child(1){
    background:#3b82f6;
}

.actions a:nth-child(2){
    background:#ef4444;
}

/* ================= EMPTY ================= */
.empty{
    text-align:center;
    margin-top:60px;
    opacity:.6;
}

/* ================= RESPONSIVE ================= */
@media(max-width:600px){
    .header{
        flex-direction:column;
        gap:10px;
    }

    #cyberText{
        font-size:28px;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- HEADER -->
<div class="header">

    <div class="logo">
        <span id="cyberText">CyberUsers CyberUsers CyberUsers</span>
    </div>

    <div class="nav">
        <a href="{% url 'user_create' %}" class="btn create-btn">Create</a>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="btn logout-btn">Logout</button>
        </form>
    </div>

</div>

<!-- USERS -->
<div class="container">

{% for user in users %}

<div class="card user-card" data-url="{% url 'user_detail' slug=user.slug %}">

    <div class="avatar">
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}">
        {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        {% endif %}
    </div>

    <div class="info">
        <h2>{{ user.first_name }} {{ user.last_name }}</h2>
        <p>{{ user.phon }}</p>
    </div>

    <div class="actions">
        <a href="{% url 'user_update' slug=user.slug %}">Edit</a>
        <a href="{% url 'user_delete' id=user.id %}">Delete</a>
        <a href="{% url 'profile' slug=user.slug %}">Profile</a>
    </div>

</div>

{% empty %}
<div class="empty">No users found</div>
{% endfor %}

</div>

<!-- JS -->
<script>

/* OPEN USER */
document.querySelectorAll(".user-card").forEach(card=>{
    card.addEventListener("click",()=>{
        window.location.href = card.dataset.url;
    });
});

/* CYBER TEXT ANIMATION */
const cyber = document.getElementById("cyberText");

let x = 0;
let dir = 1;

function moveText(){
    x += dir * 1.5;

    if(x > 150) dir = -1;
    if(x < -150) dir = 1;

    cyber.style.transform = `translateX(${x}px)`;

    requestAnimationFrame(moveText);
}

moveText();

</script>

</body>
</html>
