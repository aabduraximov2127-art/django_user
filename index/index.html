<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Users</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#070A12;
    overflow-x:hidden;
    color:white;
    padding:30px;
}

/* ===== Animated background ===== */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #6d28d9 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, #06b6d4 0%, transparent 40%),
    radial-gradient(circle at 40% 80%, #f43f5e 0%, transparent 40%);
    filter: blur(60px);
    opacity:.5;
    z-index:-2;
    animation:moveBg 10s infinite alternate;
}

@keyframes moveBg{
    from{transform:scale(1) rotate(0deg);}
    to{transform:scale(1.2) rotate(10deg);}
}

/* ===== HEADER ===== */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    flex-wrap:wrap;
    gap:20px;
}

.logo{
    font-size:38px;
    font-weight:800;
    letter-spacing:1px;
}

.logo span{
    background:linear-gradient(45deg,#06b6d4,#8b5cf6,#f43f5e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BUTTON */
.create-btn{
    padding:12px 18px;
    border-radius:14px;
    text-decoration:none;
    font-weight:600;
    color:white;
    background:linear-gradient(45deg,#6366f1,#06b6d4);
    box-shadow:0 10px 30px rgba(99,102,241,.4);
    transition:.3s;
}

.create-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 40px rgba(6,182,212,.4);
}

/* SEARCH */
.search-box{
    display:flex;
    gap:10px;
}

.search-box input{
    width:250px;
    height:45px;
    border:none;
    border-radius:12px;
    padding:0 12px;
    outline:none;
    background:rgba(255,255,255,.9);
}

.search-box button{
    border:none;
    padding:0 16px;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-weight:600;
    cursor:pointer;
}

/* ===== GRID ===== */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:22px;
}

/* ===== CARD ===== */
.card{
    position:relative;
    padding:22px;
    border-radius:22px;
    text-align:center;
    cursor:pointer;

    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(18px);

    transform-style:preserve-3d;
    transition:.4s;
    overflow:hidden;
}

/* glow line */
.card::before{
    content:'';
    position:absolute;
    width:120%;
    height:120%;
    top:-50%;
    left:-50%;
    background:linear-gradient(45deg,transparent,rgba(255,255,255,.2),transparent);
    transform:rotate(25deg);
    transition:.5s;
}

.card:hover::before{
    left:100%;
}

/* hover float */
.card:hover{
    transform:translateY(-10px) rotateX(8deg);
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

/* AVATAR */
.avatar{
    width:85px;
    height:85px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #06b6d4;
    box-shadow:0 0 25px rgba(6,182,212,.4);
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* NAME */
.name{
    margin-top:14px;
    font-size:18px;
    font-weight:700;
}

/* ACTIONS */
.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:15px;
}

.actions a{
    padding:8px 12px;
    border-radius:10px;
    text-decoration:none;
    font-size:13px;
    font-weight:600;
    color:white;
    transition:.3s;
}

.update{
    background:linear-gradient(45deg,#3b82f6,#06b6d4);
}

.delete{
    background:linear-gradient(45deg,#ef4444,#f97316);
}

.actions a:hover{
    transform:scale(1.1);
}

/* EMPTY */
.empty{
    text-align:center;
    margin-top:60px;
    font-size:22px;
    opacity:.7;
}

/* RESPONSIVE */
@media(max-width:700px){
    body{padding:18px;}

    .header{
        flex-direction:column;
        align-items:flex-start;
    }

    .search-box{
        width:100%;
    }

    .search-box input{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HEADER -->
<div class="header">

    <div class="logo">
        Cyber<span>Users</span>
    </div>

    <div class="nav">

        <a href="{% url 'user_create' %}" class="create-btn">
            + Create
        </a>

        <form class="search-box" method="GET">
            <input type="text" name="q" placeholder="Search user..." value="{{ query }}">
            <button type="submit">Go</button>
        </form>

    </div>

</div>

<!-- USERS -->
<div class="container">

{% for user in users %}

<div class="card user-card" data-url="{% url 'user_detail' slug=user.slug %}">

    <div class="avatar">
        {% if user.avatar %}
            <img src="{{ user.avatar.url }}">
        {% else %}
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        {% endif %}
    </div>

    <div class="name">
        {{ user.first_name }} {{ user.last_name }}
    </div>

    <div class="actions">
        <a href="{% url 'user_update' slug=user.slug %}" class="update" onclick="event.stopPropagation()">Edit</a>
        <a href="{% url 'user_delete' id=user.id %}" class="delete" onclick="event.stopPropagation()">Del</a>
    </div>

</div>

{% empty %}
<div class="empty">No users found</div>
{% endfor %}

</div>

<script>
document.querySelectorAll(".user-card").forEach(card=>{
    card.addEventListener("click",()=>{
        window.location.href = card.dataset.url;
    });
});
</script>

</body>
</html>
