<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal: Update Node Identity</title>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* ================= RESET & CORE ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050508;
            color: #00ff66; /* Terminal yashil rang */
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT Monitor chiziqlari (Bosh sahifa bilan bir xil) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .terminal-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: rgba(0, 255, 102, 0.02);
            filter: blur(120px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        /* ================= TERMINAL WINDOW ================= */
        .terminal-window {
            width: 520px;
            background: #0a0a0f;
            border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.1);
            overflow: hidden;
            animation: bootUp 0.4s ease-out;
        }

        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.97) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Yuqori qism (Header) */
        .terminal-header {
            background: #11111a;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
        }

        .terminal-buttons {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .terminal-title {
            font-size: 11px;
            color: rgba(0, 255, 102, 0.6);
            letter-spacing: 1px;
        }

        /* Ichki qism (Body) */
        .terminal-body {
            padding: 35px 30px;
        }

        .system-prompt {
            font-size: 13px;
            margin-bottom: 25px;
            color: #ffffff;
            border-left: 3px solid #00ff66;
            padding-left: 10px;
        }

        /* ================= KIBER FORM ELEMENTLARI ================= */
        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(0, 255, 102, 0.5);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Buyruq satri prefiksi ( > ) */
        .input-wrapper::before {
            content: ">";
            position: absolute;
            left: 0;
            color: #00ff66;
            font-size: 15px;
            font-weight: bold;
        }

        /* Django formasi orqali chiqadigan barcha inputlarni boshqarish */
        .input-wrapper input,
        .input-wrapper textarea,
        .input-wrapper select {
            width: 100%;
            padding: 10px 10px 10px 20px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
            outline: none;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-wrapper textarea {
            resize: none;
            height: 75px;
        }

        /* Fayl yuklash (Avatar) inputi uchun maxsus kiber moslashuv */
        .input-wrapper input[type="file"] {
            color: rgba(0, 255, 102, 0.7);
            font-size: 12px;
            cursor: pointer;
        }

        /* Fokus bo'lganda liniya va harflar charoqlashadi */
        .input-wrapper input:focus,
        .input-wrapper textarea:focus {
            border-bottom-color: #00ff66;
            box-shadow: 0 4px 10px rgba(0, 255, 102, 0.03);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        /* Input ichidagi Django ko'rsatmalari matni rangini to'g'rilash */
        .input-wrapper a {
            color: #00ff66;
            font-size: 12px;
            text-decoration: none;
            margin-right: 10px;
        }

        /* ================= COMMAND EXECUTION BUTTON ================= */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .submit-btn:hover {
            background: #00ff66;
            color: #050508;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
        }

        /* Rad etish (Orqaga) sarlavhasi */
        .abort-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255, 0, 85, 0.6); /* Tizimni bekor qilish xavf rangi */
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .abort-link:hover {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
    </style>
</head>
<body>

    <div class="terminal-glow"></div>

    <!-- TERMINAL OYNASI -->
    <div class="terminal-window">
        
        <!-- Oyna paneli -->
        <div class="terminal-header">
            <div class="terminal-buttons">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="terminal-title">SYS://OVERWRITE_IDENTITY.EXE</div>
        </div>

        <!-- Terminal tanasi -->
        <div class="terminal-body">
            
            <div class="system-prompt">Authorized Node Access: Modifying credentials...</div>

            <form method="POST" enctype="multipart/form-data" id="identityForm">
                {% csrf_token %}

                <div class="input-group">
                    <label>sys.identity/first_name</label>
                    <div class="input-wrapper">
                        {{ form.first_name }}
                    </div>
                </div>

                <div class="input-group">
                    <label>sys.identity/last_name</label>
                    <div class="input-wrapper">
                        {{ form.last_name }}
                    </div>
                </div>

                <div class="input-group">
                    <label>sys.identity/avatar_matrix</label>
                    <div class="input-wrapper">
                        {{ form.avatar }}
                    </div>
                </div>

                <div class="input-group">
                    <label>sys.identity/biography_log</label>
                    <div class="input-wrapper">
                        {{ form.bio }}
                    </div>
                </div>

                <div class="input-group">
                    <label>sys.identity/web_node_url</label>
                    <div class="input-wrapper">
                        {{ form.website }}
                    </div>
                </div>

                <div class="input-group">
                    <label>sys.identity/secure_email</label>
                    <div class="input-wrapper">
                        {{ form.email }}
                    </div>
                </div>

                <div class="input-group">
                    <label>sys.identity/network_phone</label>
                    <div class="input-wrapper">
                        {{ form.phon }}
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="runBtn">
                    [ INJECT NEW DATA ]
                </button>
            </form>

            <a href="{% url 'user_list' %}" class="abort-link">
                <!- ESC: DISCARD_CHANGES ->
            </a>

        </div>
    </div>

    <!-- JS: Saqlash vaqtida kiber effekt berish -->
    <script>
        document.getElementById("identityForm").addEventListener("submit", function() {
            const button = document.getElementById("runBtn");
            button.innerText = "[ OVERWRITING SECTOR... ]";
            button.style.background = "rgba(0, 255, 102, 0.1)";
            button.style.pointerEvents = "none";
        });
    </script>

</body>
</html>
