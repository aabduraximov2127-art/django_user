<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= BODY ================= */
body{
    min-height:100vh;
    background:#05060a;
    color:white;
    padding:30px;
    overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #6366f1, transparent 40%),
    radial-gradient(circle at 80% 30%, #06b6d4, transparent 45%),
    radial-gradient(circle at 50% 80%, #f43f5e, transparent 45%);
    filter:blur(90px);
    opacity:.55;
    animation:move 8s infinite alternate;
    z-index:-1;
}

@keyframes move{
    from{transform:scale(1);}
    to{transform:scale(1.2) rotate(8deg);}
}

/* ================= LAYOUT ================= */
.container{
    max-width:900px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 2fr;
    gap:25px;
}

/* ================= LEFT PROFILE CARD ================= */
.profile-card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    padding:25px;
    backdrop-filter:blur(20px);
    text-align:center;
    transition:.3s;
}

.profile-card:hover{
    transform:translateY(-5px);
}

/* AVATAR */
.avatar{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #06b6d4;
    box-shadow:0 0 25px rgba(6,182,212,0.4);
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* NAME */
.name{
    margin-top:15px;
    font-size:20px;
    font-weight:700;
}

/* STATUS */
.status{
    font-size:13px;
    opacity:.7;
    margin-top:5px;
}

/* ================= RIGHT INFO ================= */
.info-card{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:20px;
    padding:18px 20px;
    backdrop-filter:blur(20px);
    transition:.3s;
}

.box:hover{
    transform:translateY(-4px);
    border-color:rgba(6,182,212,0.4);
}

/* LABEL */
.label{
    font-size:12px;
    opacity:.6;
}

/* VALUE */
.value{
    font-size:16px;
    font-weight:600;
    margin-top:5px;
}

/* ================= ACTIONS ================= */
.actions{
    display:flex;
    gap:12px;
    margin-top:10px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    text-decoration:none;
    text-align:center;
    color:white;
}

.update{
    background:linear-gradient(45deg,#6366f1,#06b6d4);
}

.delete{
    background:linear-gradient(45deg,#ef4444,#f97316);
}

.back{
    background:rgba(255,255,255,0.1);
}

.btn:hover{
    transform:translateY(-3px);
}

/* ================= RESPONSIVE ================= */
@media(max-width:800px){
    .container{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- LEFT -->
    <div class="profile-card">

        <div class="avatar">
            {% if user.avatar %}
                <img src="{{ user.avatar.url }}">
            {% else %}
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            {% endif %}
        </div>

        <div class="name">
            {{ user.first_name }} {{ user.last_name }}
        </div>

        <div class="status">
            Active User • Cyber Profile
        </div>

    </div>

    <!-- RIGHT -->
    <div class="info-card">

        <div class="box">
            <div class="label">Full Name</div>
            <div class="value">{{ user.first_name }} {{ user.last_name }}</div>
        </div>

        <div class="box">
            <div class="label">Age</div>
            <div class="value">{{ user.age }}</div>
        </div>

        <div class="box">
            <div class="label">Email</div>
            <div class="value">{{ user.email }}</div>
        </div>

        <div class="box">
            <div class="label">Phone</div>
            <div class="value">{{ user.phon }}</div>
        </div>

        <div class="actions">

            <a href="{% url 'user_update' slug=user.slug %}" class="btn update">
                Update
            </a>

            <a href="{% url 'user_delete' id=user.id %}" class="btn delete">
                Delete
            </a>

            <a href="{% url 'user_list' %}" class="btn back">
                Back
            </a>

        </div>

    </div>

</div>

</body>
</html>
