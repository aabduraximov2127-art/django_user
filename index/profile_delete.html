<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danger Zone</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020208;
    font-family:'Rajdhani',sans-serif;
    overflow:hidden;
}

/* GLOW */
.glow{
    position:absolute;
    width:600px;
    height:600px;
    filter:blur(180px);
    opacity:.25;
}

.red{background:#ff0055; top:-200px; left:-200px;}
.blue{background:#00d2ff; bottom:-200px; right:-200px;}

.card{
    width:460px;
    padding:40px;
    border-radius:26px;
    background:rgba(10,10,20,.78);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
    z-index:10;
    box-shadow:0 20px 60px rgba(0,0,0,.7);
    animation:show .6s ease;
}

@keyframes show{
    from{opacity:0; transform:translateY(30px) scale(.9);}
    to{opacity:1; transform:translateY(0) scale(1);}
}

.icon{
    font-size:55px;
    color:#ff0055;
    animation:pulse 1.6s infinite;
}

@keyframes pulse{
    50%{transform:scale(1.15);}
}

h1{
    font-family:'Orbitron',sans-serif;
    color:white;
    margin-top:10px;
    letter-spacing:2px;
}

p{
    color:#94a3b8;
    margin:15px 0 25px;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    margin-top:10px;
    transition:.3s;
}

.delete{
    background:linear-gradient(135deg,#ff0055,#990033);
    color:white;
}

.delete:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(255,0,85,.3);
}

.cancel{
    background:#111827;
    color:#cbd5e1;
}

.cancel:hover{
    background:#1f2937;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal.active{
    display:flex;
}

.modal-box{
    width:400px;
    background:#0f172a;
    padding:30px;
    border-radius:18px;
    border:1px solid #ff0055;
    text-align:center;
    animation:pop .25s ease;
}

@keyframes pop{
    from{transform:scale(.8); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

.modal-box h2{
    color:#ff0055;
    font-family:'Orbitron';
}

.modal-box p{
    color:#cbd5e1;
    margin:10px 0 15px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0b1220;
    color:white;
    text-align:center;
    letter-spacing:2px;
    outline:none;
}

input:focus{
    border-color:#ff0055;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.ok{
    background:#ff0055;
    color:white;
}

.no{
    background:#1f2937;
    color:#cbd5e1;
}

.shake{
    animation:shake .4s;
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
}

</style>
</head>

<body>

<div class="glow red"></div>
<div class="glow blue"></div>

<div class="card">

    <div class="icon">⚠</div>
    <h1>DANGER ZONE</h1>
    <p>This action is irreversible. Be careful.</p>

    <form method="POST" id="deleteForm">
        {% csrf_token %}

        <button type="button" class="btn delete" onclick="openModal()">
            DELETE PROFILE
        </button>

        <a href="{% url 'user_list' %}">
            <button type="button" class="btn cancel">
                CANCEL
            </button>
        </a>

    </form>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

    <div class="modal-box" id="box">

        <h2>FINAL CONFIRMATION</h2>

        <p>Type <b>DELETE</b> to confirm</p>

        <input type="text" id="input">

        <div class="actions">

            <button class="btn ok" onclick="confirmDelete()">
                CONFIRM
            </button>

            <button class="btn no" onclick="closeModal()">
                CANCEL
            </button>

        </div>

    </div>

</div>

<script>

function openModal(){
    document.getElementById("modal").classList.add("active");
    document.getElementById("input").value = "";
    document.getElementById("input").focus();
}

function closeModal(){
    document.getElementById("modal").classList.remove("active");
}

function confirmDelete(){

    let val = document.getElementById("input").value;
    let box = document.getElementById("box");

    if(val === "DELETE"){
        document.getElementById("deleteForm").submit();
    }else{
        box.classList.add("shake");
        document.getElementById("input").value = "";
        document.getElementById("input").placeholder = "WRONG WORD!";
        setTimeout(()=>box.classList.remove("shake"),400);
    }
}

/* ESC CLOSE */
document.addEventListener("keydown",(e)=>{
    if(e.key === "Escape"){
        closeModal();
    }
});

</script>

</body>
</html>
