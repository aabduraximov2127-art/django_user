<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delete Profile</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
        }

        .container{
            width: 400px;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            color: white;
            margin-bottom: 15px;
        }

        p{
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .buttons{
            display: flex;
            gap: 10px;
        }

        button{
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .delete-btn{
            background: #ef4444;
            color: white;
        }

        .delete-btn:hover{
            background: #dc2626;
        }

        .cancel-btn{
            background: #334155;
            color: white;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .cancel-btn:hover{
            background: #475569;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Delete Profile</h1>

        <p>
            Are you sure you want to delete this profile?
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="buttons">

                <button type="submit" class="delete-btn">
                    Delete
                </button>

                <a href="{% url 'user_detail' user.id %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</body>
</html>
