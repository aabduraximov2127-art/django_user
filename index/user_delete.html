<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete User</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= BODY ================= */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05060a;
    overflow:hidden;
    color:white;
}

/* ================= BACKGROUND ================= */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, #ef4444, transparent 40%),
    radial-gradient(circle at 80% 30%, #f97316, transparent 45%),
    radial-gradient(circle at 50% 80%, #dc2626, transparent 45%);
    filter:blur(90px);
    opacity:.45;
    animation:move 6s infinite alternate;
    z-index:-1;
}

@keyframes move{
    from{transform:scale(1);}
    to{transform:scale(1.2) rotate(8deg);}
}

/* ================= MAIN CARD ================= */
.card{
    width:420px;
    padding:30px;
    border-radius:22px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);

    text-align:center;
    animation:pop .4s ease;
}

@keyframes pop{
    from{transform:scale(.7); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* TITLE */
h1{
    font-size:22px;
    margin-bottom:10px;
    color:#ef4444;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{text-shadow:0 0 0 rgba(239,68,68,0);}
    50%{text-shadow:0 0 20px rgba(239,68,68,0.6);}
    100%{text-shadow:0 0 0 rgba(239,68,68,0);}
}

/* TEXT */
h2{
    font-size:14px;
    opacity:.8;
    margin-bottom:20px;
    line-height:1.6;
}

/* USER LINK */
.user-link{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.user-link:hover{
    text-decoration:underline;
}

/* ================= BUTTONS ================= */
.btn{
    padding:12px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    transition:.3s;
}

.delete-btn{
    width:100%;
    background:linear-gradient(45deg,#ef4444,#f97316);
    color:white;
}

.delete-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 40px rgba(239,68,68,0.3);
}

.cancel-btn{
    margin-top:10px;
    width:100%;
    background:rgba(255,255,255,0.1);
    color:white;
}

.cancel-btn:hover{
    background:rgba(255,255,255,0.2);
}

/* ================= MODAL ================= */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);

    display:none;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(5px);
}

.modal-box{
    width:340px;
    padding:25px;
    border-radius:18px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);

    text-align:center;
    animation:shake .4s ease;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-3px);}
    100%{transform:translateX(0);}
}

/* MODAL TEXT */
.modal-box h3{
    color:#ef4444;
    margin-bottom:10px;
}

.modal-box p{
    font-size:13px;
    opacity:.8;
    margin-bottom:20px;
}

/* MODAL BUTTONS */
.row{
    display:flex;
    gap:10px;
}

.row button{
    flex:1;
}

/* BLUR EFFECT */
.blur{
    filter:blur(5px);
    pointer-events:none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- MAIN -->
<div class="card" id="page">

    <h1>⚠ DANGER ZONE</h1>

    <h2>
        Siz rostan ham o‘chirmoqchimisiz?<br><br>

        <a class="user-link" href="{% url 'user_detail' slug=user.slug %}">
            {{ user.first_name }} {{ user.last_name }}
        </a>
    </h2>

    <button class="btn delete-btn" onclick="openModal()">
        DELETE USER
    </button>

    <a href="{% url 'user_list' %}">
        <button class="btn cancel-btn">CANCEL</button>
    </a>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

    <div class="modal-box">

        <h3>⚠ FINAL WARNING</h3>
        <p>This action cannot be undone.</p>

        <form method="post" id="deleteForm">
            {% csrf_token %}

            <div class="row">

                <button type="button" class="btn cancel-btn" onclick="closeModal()">
                    No
                </button>

                <button type="submit" class="btn delete-btn">
                    Yes Delete
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal(){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("page").classList.add("blur");
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    document.getElementById("page").classList.remove("blur");
}

</script>

</body>
</html>
